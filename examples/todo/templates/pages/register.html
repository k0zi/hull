{% extends "base.html" %}

{% block title %}{{ t.reg_title }} — {{ t.site_title }}{% end %}

{% block content %}
<h1>{{ t.reg_title }}</h1>

{% if error %}
<div class="error-msg">{{ error }}</div>
{% end %}

<form method="POST" action="/register">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <div class="form-group">
        <label for="name">{{ t.reg_name }}</label>
        <input type="text" id="name" name="name" required autofocus>
    </div>
    <div class="form-group">
        <label for="email">{{ t.reg_email }}</label>
        <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
        <label for="password">{{ t.reg_pass }}</label>
        <input type="password" id="password" name="password" minlength="8" required>
    </div>
    <button type="submit" class="btn">{{ t.reg_submit }}</button>
</form>

<p class="auth-link">
    {{ t.has_account }} <a href="/login">{{ t.login_link }}</a>
</p>
{% end %}
