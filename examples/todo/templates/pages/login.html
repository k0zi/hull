{% extends "base.html" %}

{% block title %}{{ t.login_title }} — {{ t.site_title }}{% end %}

{% block content %}
<h1>{{ t.login_title }}</h1>

{% if error %}
<div class="error-msg">{{ error }}</div>
{% end %}

<form method="POST" action="/login">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <div class="form-group">
        <label for="email">{{ t.login_email }}</label>
        <input type="email" id="email" name="email" required autofocus>
    </div>
    <div class="form-group">
        <label for="password">{{ t.login_pass }}</label>
        <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" class="btn">{{ t.login_submit }}</button>
</form>

<p class="auth-link">
    {{ t.no_account }} <a href="/register">{{ t.register_link }}</a>
</p>
{% end %}
